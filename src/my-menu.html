<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Menu</title>
    <!-- these are preconnects + google fonts link they're for the custom fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- bootstrap and CSS style sheet links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">
                <img id="navbar-logo-img" src="../assets/homeplate-logo-transparent.png" alt="">
                <h1 id="navbar-header-text">HomePlate</h1>
            </a>
        </div>
    </nav>

    <!-- main content -->
   <div class="main-box">

        <!-- sidebar -->
        <div class="sidebar-container">
            <nav class="sidebar-nav">
                <!-- sidebar links + tooltips -->
                <a href="#">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="Messages" src="../assets/envelope-icon.png" alt="">
                </a>
                <a href="#">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="Analytics" src="../assets/chart-icon.png" alt="">
                </a>
                <a href="../src/manage-user.html">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="User Management" src="../assets/users-icon.png" alt="">
                </a>
                <a href="#">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="My Account" src="../assets/default-user.png" alt="">
                </a>
            </nav>
        </div>
            

        <!--Main Content-->
        <div class="dashboard-container">
            <div class="container" style="margin-top: 20px;">
                <h2 style="align-self: center;">My Menu</h2>
                <button class="button-ready" type="button" data-bs-toggle="modal" data-bs-target="#menu-edit-form">Add New Item +</button>
                <div class ="order-row">
                    <div class = "order-row-header">
                        <div class="order-info">
                            <span><strong>Item#</strong> 12345</span>
                            <span><strong>Name:</strong> Placeholder Item</span>
                            <span><strong>Price:</strong> $15.00</span>
                        </div>
                        <button class="button-details" type="button" data-bs-toggle="collapse" data-bs-target="#itemDetails12345" aria-expanded="false" aria-controls="itemDetails12345">
                            Details
                        </button>
                        <button class="button-ready" type="button" data-bs-toggle="modal" data-bs-target="#menu-edit-form">Edit</button>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="itemAvailable12345" checked>
                                <label class="form-check-label switch-label" for="itemAvailable12345" aria-hidden="true">
                                    <span class="label-on">Available</span>
                                    <span class="label-off">Unavailable</span>
                                </label>
                            </input>
                        </div>
                    </div>          
                    <div class="collapse" id="itemDetails12345">
                        <p><strong>Description:</strong></p>
                            <ul>
                                <li>An example description of a menu item.</li>
                            </ul>
                        <p><strong>Ingredients:</strong></p>
                            <ul>
                                <li>Example ingredient 1</li>
                                <li>Example ingredient 2</li>
                            </ul>
                        <p><strong>Category:</strong> Example Category</p>
                        <img src="../assets/family-dinner-img.jpg" alt="Image of Placeholder Item" class="item-image" style="max-width: 200px; max-height: 200px;">
                        <button class="button-delete" type="button">Delete Item</button>
                    </div>
            </div>
        </div>

        <div class="modal fade" id="menu-edit-form" tabindex="-1" aria-labelledby="menu-edit-form-label" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="menu-edit-form-label">Edit Menu Item</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form method="post" action="/edit-menu-item">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="itemName" class="form-label">Item Name</label>
                                <input type="text" class="form-control" id="itemName" name="itemName" value="Placeholder Item">
                            </div>
                            <div class="mb-3">
                                <label for="itemCategory" class="form-label">Category</label>
                                <input type="text" class="form-control" id="itemCategory" name="itemCategory" value="Example Category">
                            </div>
                            <div class="mb-3">
                                <label for="itemImage" class="form-label">Image</label>
                                <input type="file" class="form-control" id="itemImage" name="itemImage" accept="image/*">
                            </div>
                            <div class="mb-3">
                                <label for="itemIngredients" class="form-label">Ingredients(Please list ingredients separated by commas)</label>
                                <input type="text" class="form-control" id="itemIngredients" name="itemIngredients" value="Example ingredient 1, Example ingredient 2">
                            </div>
                            <div class="mb-3">
                                <label for="itemPrice" class="form-label">Price</label>
                                <input type="number" step="0.01" class="form-control" id="itemPrice" name="itemPrice" value="15.00">
                            </div>
                            <div class="mb-3">
                                <label for="itemDescription" class="form-label">Description</label>
                                <textarea class="form-control" id="itemDescription" name="itemDescription" rows="3">An example description of a menu item.</textarea>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                            <button type="submit" class="btn btn-primary">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>


    <!-- script for the tooltips to work -->
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>

</body>
</html>
