<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard</title>
    <!-- these are preconnects + google fonts link they're for the custom fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- bootstrap and CSS style sheet links -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <link rel="stylesheet" href="../style.css">
</head>

<body>
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a href="../src/index.html" class="navbar-brand">
                <img id="navbar-logo-img" src="../assets/homeplate-logo-transparent.png" alt="">
                <h1 id="navbar-header-text">HomePlate</h1>
            </a>

            <a class="nav-item nav-link m-2" id="logout-nav-button" href="../src/admin-dashboard.html">
                Back to dash
            </a>
        </div>
    </nav>


    <!-- box for the main area (the entire visible screen aside from navbar basically) -->
    <div class="main-box">

        <!-- sidebar -->
        <div class="sidebar-container">
            <nav class="sidebar-nav">
                <!-- sidebar links + tooltips -->
                <a href="../src/admin-dashboard.html">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="Dashboard Home" src="../assets/home-icon.png" alt="">
                </a>
                <a href="../src/vendor-applications.html">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="Vendor Applications" src="../assets/applications-icon.png" alt="">
                </a>
                <a href="#">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="Revenue" src="../assets/revenue-icon.png" alt="">
                </a>
                <a href="../src/manage-user.html">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="User Management" src="../assets/users-icon.png" alt="">
                </a>
                <a href="#">
                    <img class="sidebar-nav-link-icon" data-bs-toggle="tooltip" data-bs-placement="right" title="My Account" src="../assets/default-user.png" alt="">
                </a>
            </nav>
        </div>

        <!-- container for main dashboard content -->
        <div class="dashboard-container">

            <!-- container for all the cards present -->
            <div class="analytics-container">

                <!-- recent activity cards -->
                <div class="row card-container">
                    <h2 id="recent-activity-heading" >Recent Activity</h2>
                    <p> Will be the same style as below based on what you last did</p>      
                </div>

                <div class="row card-container">
                    <h2 id="recent-activity-heading">What to do next</h2>
                    <div class="card"> 
                        <a href="live-operations.html">
                            <img class="card-img-top" src="../assets/placeholder-img.png" alt="">
                            <div class="card-body">
                                <p class="card-text">Open Store</p>
                            </div>
                        </a>
                    </div>

                    <div class="card"> 
                        <a href="my-menu.html">
                            <img class="card-img-top" src="../assets/placeholder-img.png" alt="">
                            <div class="card-body">
                                <p class="card-text">My Menu</p>
                            </div>
                        </a>
                    </div>

                   <div class="card"> 
                        <a href="#">
                            <img class="card-img-top" src="../assets/placeholder-img.png" alt="">
                            <div class="card-body">
                                <p class="card-text">My Profile</p>
                            </div>
                        </a>
                    </div>

                    <div class="card"> 
                        <a href="my-store-reviews.html">
                            <img class="card-img-top" src="../assets/placeholder-img.png" alt="">
                            <div class="card-body">
                                <p class="card-text">Reviews of My Store</p>
                            </div>
                        </a>
                    </div>

                   <div class="card"> 
                        <a href="merchant-reports.html">
                            <img class="card-img-top" src="../assets/placeholder-img.png" alt="">
                            <div class="card-body">
                                <p class="card-text">Reports</p>
                            </div>
                        </a>
                    </div>
                    
                </div>
            </div>


        </div>
    </div>
    
    <script>
        var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
        var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
