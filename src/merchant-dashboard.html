<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Dashboard - HomePlate</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Pacifico&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="merchant-dashboard.css">
</head>

<body>
    <!-- ===================== NAVBAR ===================== -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">
                <img id="navbar-logo-img" src="../assets/homeplate-logo-transparent.png" alt="HomePlate Logo">
                <h1 id="navbar-header-text">HomePlate</h1>
            </a>
            <div class="ms-auto d-flex align-items-center gap-3">
                <span style="font-family:'Poppins',sans-serif;font-size:0.88rem;color:var(--cream-primary);">
                    Welcome, <strong>Mock User</strong>
                </span>
                <button class="btn btn-sm btn-hp">Logout</button>
            </div>
        </div>
    </nav>

    <!-- ===================== DASHBOARD LAYOUT ===================== -->
    <div class="dashboard-layout">

        <!-- ---- Sidebar ---- -->
        <div class="sidebar-container">
            <nav class="sidebar-nav">

                <a href="index.html" class="sidebar-nav-link">
                    <i class="bi bi-house-fill"></i>
                    <span>Home</span>
                </a>
                <a href="#" class="sidebar-nav-link" id="sidebar-browse" title="Browse Cooks">
                    <i class="bi bi-search"></i>
                    <span>Browse</span>
                </a>

            </nav>
        </div>

        <!-- ---- Main Content ---- -->
        <div class="main-content">

            <!-- ============ OVERVIEW STATS ============ -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-num">14</div>
                        <div class="stat-label">Menu Items</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-num">3</div>
                        <div class="stat-label">Pending Orders</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-num">4.8</div>
                        <div class="stat-label">Avg. Rating</div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="stat-card">
                        <div class="stat-num">132</div>
                        <div class="stat-label">Total Orders</div>
                    </div>
                </div>
            </div>

            <!-- ============ SECTION TAB NAV ============ -->
            <ul class="section-tab-nav">
                <li>
                    <a href="#" class="tab-btn" id="tab-menu" onclick="showSection('menu'); return false;">
                        <i class="bi bi-journal-text me-1"></i> Menu
                    </a>
                </li>
                <li>
                    <a href="#" class="tab-btn" id="tab-orders" onclick="showSection('orders'); return false;">
                        <i class="bi bi-bag-check me-1"></i> Orders
                        <span class="badge ms-1" style="background-color:var(--burnt-orange-primary);font-size:0.7rem;">3</span>
                    </a>
                </li>
                <li>
                    <a href="#" class="tab-btn" id="tab-reviews" onclick="showSection('reviews'); return false;">
                        <i class="bi bi-star-half me-1"></i> Reviews
                    </a>
                </li>
            </ul>

            <!-- ============ SECTION CONTENT (fragments loaded here) ============ -->
            <div id="section-content"></div>

        </div><!-- /.main-content -->
    </div><!-- /.dashboard-layout -->

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I" crossorigin="anonymous"></script>

    <script>
        // ---- Tab / sidebar active state helpers ----
        function setActiveTab(section) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.sidebar-nav-link').forEach(link => link.classList.remove('active'));

            if (section) {
                const tab = document.getElementById('tab-' + section);
                if (tab) tab.classList.add('active');
                const sidebar = document.getElementById('sidebar-' + section);
                if (sidebar) sidebar.classList.add('active');
            } else {
                // Overview — no tab active, sidebar overview active
                document.getElementById('sidebar-overview').classList.add('active');
            }
        }

        // ---- Load a section fragment into #section-content ----
        function showSection(section) {
            setActiveTab(section);
            fetch('merchant-' + section + '.html')
                .then(function(res) {
                    if (!res.ok) throw new Error('Failed to load ' + section);
                    return res.text();
                })
                .then(function(html) {
                    document.getElementById('section-content').innerHTML = html;
                })
                .catch(function(err) {
                    document.getElementById('section-content').innerHTML =
                        '<div class="alert alert-danger mt-2">Could not load section: ' + err.message + '</div>';
                });
        }

        // ---- Clear section content (Overview view) ----
        function clearSection() {
            setActiveTab(null);
            document.getElementById('section-content').innerHTML = '';
        }

        // ---- Load Menu tab by default on page load ----
        document.addEventListener('DOMContentLoaded', function() {
            showSection('menu');
        });
    </script>
</body>
</html>
