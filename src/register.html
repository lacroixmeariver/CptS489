<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HomePlate — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .auth-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
            background-color: var(--cream-primary);
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            padding: 40px 44px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.09);
        }
        .auth-logo {
            font-family: 'Pacifico', cursive;
            color: var(--burnt-orange-primary);
            font-size: 2rem;
            text-align: center;
            display: block;
            margin-bottom: 6px;
            text-decoration: none;
        }
        .auth-tagline {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.88rem;
            color: #aaa;
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-title {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--charcoal-gray-secondary);
            margin-bottom: 22px;
        }
        .auth-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--charcoal-gray-secondary);
        }
        .auth-input {
            font-family: 'Open Sans', sans-serif;
            font-size: 0.9rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px 14px;
            background: #fafafa;
            transition: border-color .2s;
        }
        .auth-input:focus {
            border-color: var(--burnt-orange-primary);
            box-shadow: 0 0 0 3px rgba(197,90,58,.12);
            outline: none;
            background: #fff;
        }
        /* Role selector cards */
        .role-card {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 14px 16px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Poppins', sans-serif;
        }
        .role-card:hover { border-color: #c8c8c8; }
        .role-card.selected { border-color: var(--burnt-orange-primary); background: rgba(197,90,58,.05); }
        .role-card input[type="radio"] { display: none; }
        .role-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        .role-icon-customer { background: rgba(197,90,58,.12); color: var(--burnt-orange-primary); }
        .role-icon-cook     { background: rgba(122,155,110,.15); color: var(--sage-green-secondary); }
        .role-icon-driver   { background: rgba(232,180,74,.15);  color: var(--golden-yellow-secondary); }
        .role-title { font-weight: 600; font-size: 0.9rem; color: var(--charcoal-gray-secondary); }
        .role-desc  { font-size: 0.78rem; color: #999; font-family: 'Open Sans', sans-serif; font-weight:400; margin-top:1px; }
        .check-circle {
            margin-left: auto;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #d0d0d0;
            flex-shrink: 0;
            transition: all .2s;
        }
        .role-card.selected .check-circle {
            background: var(--burnt-orange-primary);
            border-color: var(--burnt-orange-primary);
        }
        .role-card.selected .check-circle::after {
            content: '';
            display: block;
            width: 5px;
            height: 9px;
            border: 2px solid #fff;
            border-top: none;
            border-left: none;
            transform: rotate(45deg);
            margin: 2px auto 0 5px;
        }
        /* Password strength */
        .strength-bar-row { display: flex; gap: 4px; margin-top: 6px; }
        .strength-seg {
            height: 4px;
            flex: 1;
            border-radius: 4px;
            background: #e8e8e8;
            transition: background .3s;
        }
        .strength-label { font-size: 0.75rem; font-family: 'Open Sans',sans-serif; margin-top:3px; }
        .btn-auth {
            background: var(--burnt-orange-primary);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            border-radius: 8px;
            padding: 11px;
            width: 100%;
            transition: background .2s;
        }
        .btn-auth:hover { background: #b04e31; color: #fff; }
        .auth-footer {
            text-align: center;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.86rem;
            color: #888;
            margin-top: 22px;
        }
        .auth-footer a {
            color: var(--burnt-orange-primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover { text-decoration: underline; }
        .password-toggle { position: relative; }
        .password-toggle .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            padding: 0;
            font-size: 16px;
        }
        .section-label {
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: #aaa;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">

        <!-- Brand -->
        <a href="index.html" class="auth-logo">HomePlate</a>
        <div class="auth-tagline">Join your local food community</div>

        <div class="auth-title">Create your account</div>

        <form id="register-form" action="customer-dashboard.html" method="get" onsubmit="return validateRegister()">

            <!-- Name row -->
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="auth-label mb-1" for="reg-first">First name</label>
                    <input type="text" id="reg-first" class="form-control auth-input"
                        placeholder="First name" required autocomplete="given-name">
                </div>
                <div class="col-6">
                    <label class="auth-label mb-1" for="reg-last">Last name</label>
                    <input type="text" id="reg-last" class="form-control auth-input"
                        placeholder="Last name" required autocomplete="family-name">
                </div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="auth-label mb-1" for="reg-email">Email address</label>
                <input type="email" id="reg-email" class="form-control auth-input"
                    placeholder="you@example.com" required autocomplete="email">
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="auth-label mb-1" for="reg-password">Password</label>
                <div class="password-toggle">
                    <input type="password" id="reg-password" class="form-control auth-input"
                        placeholder="Create a password" required autocomplete="new-password"
                        oninput="updateStrength(this.value)">
                    <button type="button" class="toggle-btn" onclick="togglePassword('reg-password', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div class="strength-bar-row">
                    <div class="strength-seg" id="s1"></div>
                    <div class="strength-seg" id="s2"></div>
                    <div class="strength-seg" id="s3"></div>
                    <div class="strength-seg" id="s4"></div>
                </div>
                <div class="strength-label" id="strength-text" style="color:#bbb;">Enter a password</div>
            </div>

            <!-- Confirm Password -->
            <div class="mb-4">
                <label class="auth-label mb-1" for="reg-confirm">Confirm password</label>
                <div class="password-toggle">
                    <input type="password" id="reg-confirm" class="form-control auth-input"
                        placeholder="Repeat your password" required autocomplete="new-password">
                    <button type="button" class="toggle-btn" onclick="togglePassword('reg-confirm', this)">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
                <div id="confirm-error" style="font-family:'Open Sans',sans-serif;font-size:0.8rem;color:#dc3545;display:none;margin-top:4px;">
                    Passwords do not match.
                </div>
            </div>

            <!-- Role selector -->
            <div class="section-label">I am joining as a…</div>
            <div class="d-flex flex-column gap-2 mb-4">
                <label class="role-card selected" id="card-customer">
                    <input type="radio" name="role" value="customer" checked onchange="selectRole('card-customer')">
                    <div class="role-icon role-icon-customer"><i class="bi bi-person-fill"></i></div>
                    <div>
                        <div class="role-title">Customer</div>
                        <div class="role-desc">Browse menus and order from home cooks nearby</div>
                    </div>
                    <div class="check-circle" id="cc-customer"></div>
                </label>

                <label class="role-card" id="card-cook">
                    <input type="radio" name="role" value="cook" onchange="selectRole('card-cook')">
                    <div class="role-icon role-icon-cook"><i class="bi bi-fire"></i></div>
                    <div>
                        <div class="role-title">Home Cook</div>
                        <div class="role-desc">Share your recipes and sell meals to your community</div>
                    </div>
                    <div class="check-circle" id="cc-cook"></div>
                </label>

                <label class="role-card" id="card-driver">
                    <input type="radio" name="role" value="driver" onchange="selectRole('card-driver')">
                    <div class="role-icon role-icon-driver">
                        <i class="bi bi-bicycle"></i>
                    </div>
                    <div>
                        <div class="role-title">Delivery Driver</div>
                        <div class="role-desc">Deliver meals and earn money on your own schedule</div>
                    </div>
                    <div class="check-circle" id="cc-driver"></div>
                </label>
            </div>

            <!-- Terms -->
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="reg-terms" required
                    style="border-color:#ccc;">
                <label class="form-check-label" for="reg-terms"
                    style="font-family:'Open Sans',sans-serif;font-size:0.83rem;color:#777;">
                    I agree to the
                    <a href="#" style="color:var(--burnt-orange-primary);font-weight:600;text-decoration:none;">Terms of Service</a>
                    and
                    <a href="#" style="color:var(--burnt-orange-primary);font-weight:600;text-decoration:none;">Privacy Policy</a>
                </label>
            </div>

            <!-- Error -->
            <div id="reg-error" class="alert alert-danger py-2" style="font-family:'Open Sans',sans-serif;font-size:0.85rem;display:none;"></div>

            <button type="submit" class="btn-auth">
                <i class="bi bi-person-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Log in</a>
        </div>

    </div>
</div>

<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

function selectRole(selectedId) {
    ['card-customer', 'card-cook', 'card-driver'].forEach(id => {
        document.getElementById(id).classList.toggle('selected', id === selectedId);
    });
    // Check the radio inside the selected card
    document.querySelector('#' + selectedId + ' input[type="radio"]').checked = true;

    // Route to correct dashboard on submit
    const destinations = {
        'card-customer': 'customer-dashboard.html',
        'card-cook':     'customer-dashboard.html',
        'card-driver':   'driver-dashboard.html'
    };
    document.getElementById('register-form').action = destinations[selectedId];
}

function updateStrength(val) {
    let score = 0;
    if (val.length >= 8)           score++;
    if (/[A-Z]/.test(val))         score++;
    if (/[0-9]/.test(val))         score++;
    if (/[^A-Za-z0-9]/.test(val))  score++;

    const colors  = ['#e0e0e0', '#e85d04', '#f4a261', '#7a9b6e', '#2e7d32'];
    const labels  = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    const txtClrs = ['#bbb', '#dc3545', '#fd7e14', '#7a9b6e', '#2e7d32'];

    for (let i = 1; i <= 4; i++) {
        document.getElementById('s' + i).style.background = i <= score ? colors[score] : '#e8e8e8';
    }
    const txt = document.getElementById('strength-text');
    txt.textContent = val.length ? labels[score] || 'Enter a password' : 'Enter a password';
    txt.style.color = txtClrs[score] || '#bbb';
}

function validateRegister() {
    const errEl = document.getElementById('reg-error');
    const pass    = document.getElementById('reg-password').value;
    const confirm = document.getElementById('reg-confirm').value;

    document.getElementById('confirm-error').style.display = 'none';
    errEl.style.display = 'none';

    if (pass !== confirm) {
        document.getElementById('confirm-error').style.display = 'block';
        return false;
    }
    if (pass.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return false;
    }
    return true; // proceeds to customer-dashboard.html
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
